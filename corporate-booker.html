<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Passport Health — Corporate Appointment Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:#f6f5f1;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOutLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-40px)}}
@keyframes slideOutRight{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.site-header{background:#fff;border-bottom:1px solid #e8e6e1;padding:0 24px;position:sticky;top:0;z-index:100}
.header-inner{max-width:960px;margin:0 auto;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-mark{font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:#1a1a1a;background:#f0f9ff;width:42px;height:42px;display:flex;align-items:center;justify-content:center;border-radius:10px;border:2px solid #30B2EE;letter-spacing:-1px}
.logo-mark span{color:#30B2EE}
.logo-title{font-family:'Fraunces',serif;font-size:16px;font-weight:700;letter-spacing:-0.3px}
.logo-sub{font-size:11px;font-weight:500;color:#888;letter-spacing:.5px;text-transform:uppercase}
.header-badge{display:flex;align-items:center;gap:6px;color:#0ea574;background:rgba(14,165,116,.07);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600}
.hero{background:linear-gradient(135deg,#0b2a3d 0%,#134e6f 50%,#1a6e94 100%);padding:0 24px;overflow:hidden}
.hero-inner{max-width:960px;margin:0 auto;padding:44px 0 40px}
.hero-copy{max-width:600px}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(48,178,238,.15);color:#7dd3fc;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:16px;letter-spacing:.3px}
.hero-title{font-family:'Fraunces',serif;font-size:clamp(26px,4vw,38px);font-weight:700;color:#fff;line-height:1.15;letter-spacing:-.5px;margin-bottom:14px}
.hero-desc{color:rgba(255,255,255,.72);font-size:15px;line-height:1.6;max-width:520px}
.progress-wrap{background:#fff;border-bottom:1px solid #e8e6e1;padding:0 24px;overflow-x:auto}
.progress-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:center;padding:18px 0;min-width:fit-content}
.step-btn{display:flex;align-items:center;gap:8px;background:none;border:none;padding:6px 10px;border-radius:8px;cursor:default;font-family:'DM Sans',sans-serif}
.step-btn.clickable{cursor:pointer}
.step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f0ede8;color:#999;transition:all .3s;flex-shrink:0}
.step-circle.active{background:#30B2EE;color:#fff;box-shadow:0 2px 12px rgba(48,178,238,.35)}
.step-circle.done{background:#0ea574;color:#fff}
.step-label{font-size:13px;font-weight:600;color:#666;white-space:nowrap}
.step-line{width:32px;height:2px;background:#e0ddd6;border-radius:1px;margin:0 4px;transition:background .3s}
.step-line.done{background:#0ea574}
.content-outer{flex:1;padding:28px 24px 100px;max-width:960px;width:100%;margin:0 auto}
.content-card{background:#fff;border-radius:16px;padding:clamp(24px,4vw,40px);border:1px solid #e8e6e1;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.content-card.anim-in-right{animation:slideInRight .32s ease forwards}
.content-card.anim-in-left{animation:slideInLeft .32s ease forwards}
.content-card.anim-out-left{animation:slideOutLeft .28s ease forwards}
.content-card.anim-out-right{animation:slideOutRight .28s ease forwards}
.step-header{margin-bottom:28px}
.step-title{font-family:'Fraunces',serif;font-size:24px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px}
.step-desc{font-size:14px;color:#777;line-height:1.55}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
.field-label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:6px;letter-spacing:.2px}
.field-label.error{color:#e44}
.field-span-2{grid-column:1/-1}
.input,.select-field{width:100%;padding:11px 14px;font-size:15px;border:1.5px solid #ddd8d0;border-radius:10px;background:#faf9f7;font-family:'DM Sans',sans-serif;color:#1a1a1a;transition:border-color .2s,box-shadow .2s;outline:none}
.select-field{cursor:pointer;appearance:auto}
.input:focus,.select-field:focus{border-color:#30B2EE!important;box-shadow:0 0 0 3px rgba(48,178,238,.15)!important}
.field-error .input,.field-error .select-field{outline:2px solid #e44;border-radius:10px}
.err-dot{display:inline-flex;font-size:11px;font-weight:700;color:#e44;margin-left:6px;text-transform:none;letter-spacing:0}
.info-box{display:flex;gap:12px;align-items:flex-start;margin-top:28px;padding:16px 18px;border-radius:12px;background:rgba(48,178,238,.06);border:1px solid rgba(48,178,238,.15);font-size:14px;color:#1a1a1a;line-height:1.5}
.info-box.green{background:rgba(14,165,116,.07);border-color:rgba(14,165,116,.2)}
.info-box strong{display:block;margin-bottom:2px}
.info-box .sub{opacity:.8;font-size:13px}
.section-label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#555;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}
.service-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.service-card{text-align:left;padding:16px 18px;border:1.5px solid #e8e6e1;border-radius:12px;background:#faf9f7;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.service-card:hover{border-color:#c0c0c0}
.service-card.active{border-color:#30B2EE;background:rgba(48,178,238,.05);box-shadow:0 0 0 3px rgba(48,178,238,.12)}
.service-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.service-name{font-weight:600;font-size:14px;color:#1a1a1a}
.service-check{color:#30B2EE;flex-shrink:0;display:none}
.service-card.active .service-check{display:block}
.service-meta{display:flex;align-items:center;gap:4px;font-size:12px;color:#888;margin-bottom:8px}
.service-desc{font-size:13px;color:#777;line-height:1.45;margin:0}
.search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-bar .input{flex:1;min-width:200px}
.search-btn{display:inline-flex;align-items:center;gap:6px;padding:11px 24px;background:#30B2EE;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap}
.search-btn:hover{filter:brightness(1.08)}
.clinic-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.clinic-card{display:flex;align-items:center;gap:14px;padding:14px 18px;border:1.5px solid #e8e6e1;border-radius:12px;background:#faf9f7;cursor:pointer;transition:all .2s}
.clinic-card:hover{border-color:#c0c0c0}
.clinic-card.active{border-color:#30B2EE;background:rgba(48,178,238,.05);box-shadow:0 0 0 3px rgba(48,178,238,.12)}
.clinic-icon{width:40px;height:40px;border-radius:10px;background:#f0f9ff;border:1.5px solid rgba(48,178,238,.2);display:flex;align-items:center;justify-content:center;color:#30B2EE;flex-shrink:0}
.clinic-info{flex:1;min-width:0}
.clinic-name{font-weight:600;font-size:14px;margin-bottom:2px}
.clinic-addr{font-size:12px;color:#888;line-height:1.3}
.clinic-badge{font-size:11px;font-weight:600;color:#0ea574;background:rgba(14,165,116,.1);padding:4px 10px;border-radius:6px;white-space:nowrap}
.no-results{text-align:center;padding:32px 16px;color:#999;font-size:14px}
.cal-wrap{margin-bottom:24px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-family:'Fraunces',serif;font-size:18px;font-weight:700}
.cal-nav{display:flex;gap:4px}
.cal-nav button{width:32px;height:32px;border:1.5px solid #e8e6e1;border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#666;transition:all .2s}
.cal-nav button:hover:not([disabled]){border-color:#30B2EE;color:#30B2EE}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}
.cal-dow{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;padding:6px 0;letter-spacing:.5px}
.cal-day{padding:10px 4px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:1.5px solid transparent;background:transparent}
.cal-day:hover:not(.disabled):not(.empty){background:#f0f9ff;border-color:rgba(48,178,238,.2)}
.cal-day.active{background:#30B2EE;color:#fff;border-color:#30B2EE;font-weight:700}
.cal-day.today:not(.active){border-color:#30B2EE;color:#30B2EE;font-weight:700}
.cal-day.disabled{color:#ccc;cursor:not-allowed}
.cal-day.empty{cursor:default}
.time-grid{display:flex;flex-wrap:wrap;gap:8px}
.time-chip{padding:10px 20px;border:1.5px solid #e8e6e1;border-radius:10px;background:#faf9f7;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all .2s}
.time-chip:hover:not(.disabled){border-color:#c0c0c0}
.time-chip.active{border-color:#30B2EE;background:#30B2EE;color:#fff;box-shadow:0 2px 12px rgba(48,178,238,.3)}
.time-chip.disabled{opacity:.35;cursor:not-allowed;text-decoration:line-through}
.loc-preview{display:flex;gap:10px;align-items:flex-start;padding:14px 16px;border-radius:10px;background:#f0f9ff;border:1px solid rgba(48,178,238,.2);font-size:14px;color:#134e6f}
.loc-preview strong{display:block}
.loc-preview .addr{font-size:13px;opacity:.65;margin-top:2px}
.review-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.review-section{padding:16px 18px;border:1.5px solid #e8e6e1;border-radius:12px;background:#faf9f7}
.review-section-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:#30B2EE;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #ece9e3}
.review-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:13px}
.review-label{color:#888;font-weight:500}
.review-value{font-weight:600;color:#1a1a1a;text-align:right;max-width:60%;word-break:break-word}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:#30B2EE;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(48,178,238,.25)}
.btn-primary:hover{filter:brightness(1.08)}
.btn-primary.green{background:#0ea574;box-shadow:0 2px 8px rgba(14,165,116,.25)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:transparent;color:#1a1a1a;border:1.5px solid #ddd8d0;border-radius:10px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.btn-secondary:hover{border-color:#bbb}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:transparent;color:#777;border:none;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer}
.btn-back:hover{color:#444}
.footer-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid #e8e6e1;padding:0 24px;z-index:100}
.footer-nav-inner{max-width:960px;margin:0 auto;height:68px;display:flex;align-items:center;justify-content:space-between}
.site-footer{text-align:center;padding:20px 24px 90px;font-size:13px;color:#999;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.site-footer strong{color:#30B2EE}
.success-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px}
.success-card{background:#fff;border-radius:20px;padding:48px 40px;border:1px solid #e8e6e1;text-align:center;max-width:520px;width:100%;animation:fadeUp .5s ease}
.success-icon{margin-bottom:20px}
.success-title{font-family:'Fraunces',serif;font-size:28px;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
.success-sub{font-size:15px;color:#777;margin-bottom:28px}
.success-detail{text-align:left;background:#faf9f7;border-radius:12px;padding:18px 20px;border:1px solid #e8e6e1}
.success-row{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid #f0ede8}
.success-row:last-child{border-bottom:none}
.success-label{color:#888;font-weight:500;font-size:13px}
.success-btns{display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;justify-content:center}
.check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.check-card{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid #e8e6e1;border-radius:10px;background:#faf9f7;cursor:pointer;transition:all .2s;font-size:14px;font-weight:500;color:#1a1a1a;user-select:none}
.check-card:hover{border-color:#c0c0c0}
.check-card.active{border-color:#30B2EE;background:rgba(48,178,238,.05);box-shadow:0 0 0 2px rgba(48,178,238,.1)}
.check-card input[type="checkbox"]{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.check-box{width:22px;height:22px;border-radius:6px;border:1.5px solid #d0cdc6;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;background:#fff}
.check-card.active .check-box{background:#30B2EE;border-color:#30B2EE;color:#fff}
.check-label{line-height:1.3}
</style>
</head>

  if(s.step===0){if(!s.rep.company.trim())e.company=1;if(!s.rep.name.trim())e.repName=1;if(!s.rep.email.trim()||!s.rep.email.includes("@"))e.repEmail=1;if(!s.rep.phone.trim())e.repPhone=1;if(s.rep.role==="Other"&&!s.rep.otherRole)e.otherRole=1;}
  if(s.step===1){if(!s.emp.fn.trim())e.fn=1;if(!s.emp.ln.trim())e.ln=1;if(!s.emp.email.trim()||!s.emp.email.includes("@"))e.eEmail=1;if(s.emp.email.trim()&&s.rep.email.trim()&&s.emp.email.trim().toLowerCase()===s.rep.email.trim().toLowerCase())e.eEmailMatch=1;if(!s.emp.phone.trim())e.ePhone=1;if(!s.emp.dob)e.eDob=1;}
  if(s.step===2){if(!s.svc)e.svc=1;if((s.svc==="vaccine"||s.svc==="travel"||s.svc==="blood")&&s.subSel.length===0)e.subSel=1;}
  if(s.step===3){if(!s.loc)e.loc=1;if(!s.date)e.date=1;if(!s.time)e.time=1;}
  return e;
}
function animTo(n){if(s.anim)return;var dir=n>s.step?"forward":"back";s.aDir=dir;s.anim=true;var c=document.getElementById("cc");if(c)c.className="content-card anim-out-"+(dir==="forward"?"left":"right");setTimeout(function(){s.step=n;s.anim=false;render()},280);}
function goTo(n){if(n!==s.step)animTo(n);}
function goNext(){var e=validate();if(Object.keys(e).length){s.err=e;render();return;}s.err={};if(s.step<4)animTo(s.step+1);}
function goBack(){if(s.step>0)animTo(s.step-1);}
function doSubmit(){s.done=true;render();}
function bookAnother(){s.done=false;s.step=1;s.emp={fn:"",ln:"",email:"",phone:"",dob:""};s.subSel=[];s.sDone=false;s.loc="";s.date=null;s.time="";s.err={};render();}
function startOver(){s={step:0,aDir:"forward",anim:false,rep:{company:"",name:"",email:"",phone:"",role:"HR / People Ops",otherRole:""},emp:{fn:"",ln:"",email:"",phone:"",dob:""},svc:"",subSel:[],sState:"",sZip:"",sDone:false,loc:"",cM:2,cY:2026,date:null,time:"",done:false,err:{}};render();}
render();
</script>
